<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2027年度高校スポーツ大会</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <h1>🏆 2027年度高校スポーツ大会</h1>
  </header>

  <!-- メイン表示エリア -->
  <main id="page">

    <div class="card">

      <h2>ようこそ</h2>

      <p>あなたのクラスを選択してください</p>

      <select id="classSelect">

        <option value="">
          クラスを選択
        </option>

        <!-- 1年 -->
        <option>1-1</option>
        <option>1-2</option>
        <option>1-3</option>
        <option>1-4</option>
        <option>1-5</option>
        <option>1-6</option>

        <!-- 2年 -->
        <option>2-1</option>
        <option>2-2</option>
        <option>2-3</option>
        <option>2-4</option>
        <option>2-5</option>
        <option>2-6</option>
        <option>2-7</option>

        <!-- 3年 -->
        <option>3-1</option>
        <option>3-2</option>
        <option>3-3</option>
        <option>3-4</option>
        <option>3-5</option>
        <option>3-6</option>

      </select>

      <button onclick="saveClass()">
        クラスを保存
      </button>

    </div>

    <div class="card">

      <h2>次の予定</h2>

      <div id="nextEvent">
        クラスを選択してください
      </div>

    </div>

  </main>

  <!-- 下部メニュー -->
  <nav class="nav">

    <button onclick="showHome()">
      🏠
      <br>
      ホーム
    </button>

    <button onclick="showSchedule()">
      📅
      <br>
      予定
    </button>

    <button onclick="showTournament()">
      🏆
      <br>
      トーナメント
    </button>

    <button onclick="showSports()">
      🎯
      <br>
      競技
    </button>

    <button onclick="showAdminLogin()">
      🔐
      <br>
      管理
    </button>

  </nav>

  <script src="app.js"></script>

</body>
</html>
